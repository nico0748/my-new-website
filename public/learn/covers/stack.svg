<svg width="320" height="180" viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="技術スタック一覧 コース">
  <defs>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#stackBg)"/>

  <!-- タイル群（8枚）: 半透明の白タイルに簡略化した技術グリフ -->
  <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- タイル背景 -->
    <g fill="#ffffff" fill-opacity="0.13" stroke-opacity="0.55">
      <rect x="38"  y="31" width="52" height="52" rx="11"/>
      <rect x="102" y="31" width="52" height="52" rx="11"/>
      <rect x="166" y="31" width="52" height="52" rx="11"/>
      <rect x="230" y="31" width="52" height="52" rx="11"/>
      <rect x="38"  y="97" width="52" height="52" rx="11"/>
      <rect x="102" y="97" width="52" height="52" rx="11"/>
      <rect x="166" y="97" width="52" height="52" rx="11"/>
      <rect x="230" y="97" width="52" height="52" rx="11"/>
    </g>

    <!-- T1: </> コード -->
    <g fill="none" stroke-opacity="0.95">
      <path d="M58 50 L50 57 L58 64"/>
      <path d="M70 50 L78 57 L70 64"/>
    </g>

    <!-- T2: アトム（フロントエンド系） -->
    <g fill="none" stroke-opacity="0.95">
      <ellipse cx="128" cy="57" rx="15" ry="6"/>
      <ellipse cx="128" cy="57" rx="15" ry="6" transform="rotate(60 128 57)"/>
      <ellipse cx="128" cy="57" rx="15" ry="6" transform="rotate(120 128 57)"/>
    </g>
    <circle cx="128" cy="57" r="2.6" fill="#ffffff" stroke="none"/>

    <!-- T3: モバイル端末 -->
    <g stroke-opacity="0.95">
      <rect x="184" y="43" width="16" height="28" rx="3" fill="none"/>
      <circle cx="192" cy="67" r="1.3" fill="#ffffff" stroke="none"/>
    </g>

    <!-- T4: クラウド -->
    <path d="M247 62 a5 5 0 0 1 1 -10 a7 7 0 0 1 13 -1 a5 5 0 0 1 0 11 z" fill="none" stroke-opacity="0.95"/>

    <!-- T5: バックエンド（スタックしたサーバ） -->
    <g fill="none" stroke-opacity="0.95">
      <rect x="53" y="111" width="22" height="7" rx="2"/>
      <rect x="53" y="120" width="22" height="7" rx="2"/>
      <rect x="53" y="129" width="22" height="7" rx="2"/>
    </g>
    <g fill="#ffffff" stroke="none">
      <circle cx="58" cy="114.5" r="1.1"/>
      <circle cx="58" cy="123.5" r="1.1"/>
      <circle cx="58" cy="132.5" r="1.1"/>
    </g>

    <!-- T6: データベース（円筒） -->
    <g fill="none" stroke-opacity="0.95">
      <ellipse cx="128" cy="114" rx="12" ry="4"/>
      <path d="M116 114 v16 a12 4 0 0 0 24 0 v-16"/>
      <path d="M116 122 a12 4 0 0 0 24 0"/>
    </g>

    <!-- T7: コンテナ（モジュールの箱） -->
    <g fill="none" stroke-opacity="0.95">
      <rect x="182" y="113" width="20" height="20" rx="2.5"/>
      <path d="M192 113 v20 M182 123 h20"/>
    </g>

    <!-- T8: ターミナル >_ -->
    <g fill="none" stroke-opacity="0.95">
      <path d="M250 118 l5 5 l-5 5"/>
      <path d="M258 130 h6"/>
    </g>
  </g>
</svg>
