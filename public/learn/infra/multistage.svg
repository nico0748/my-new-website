<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="ms" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- builder stage -->
  <rect x="30" y="40" width="280" height="240" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="170" y="68" text-anchor="middle" fill="#c2410c" font-size="14" font-weight="700">builder ステージ</text>
  <text x="170" y="88" text-anchor="middle" fill="#9a3412" font-size="11">ビルド専用・最終イメージには残らない</text>

  <rect x="58" y="104" width="224" height="30" rx="6" fill="#fed7aa"/>
  <text x="170" y="124" text-anchor="middle" fill="#9a3412" font-size="12">ソースコード一式</text>
  <rect x="58" y="140" width="224" height="30" rx="6" fill="#fed7aa"/>
  <text x="170" y="160" text-anchor="middle" fill="#9a3412" font-size="12">devDependencies</text>
  <rect x="58" y="176" width="224" height="30" rx="6" fill="#fed7aa"/>
  <text x="170" y="196" text-anchor="middle" fill="#9a3412" font-size="12">コンパイラ / ビルドツール</text>
  <rect x="58" y="212" width="224" height="30" rx="6" fill="#22c55e"/>
  <text x="170" y="232" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">ビルド成果物 dist/</text>

  <text x="170" y="266" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="700">✕ ビルド後に丸ごと破棄</text>

  <!-- arrow -->
  <line x1="312" y1="160" x2="402" y2="160" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="400,152 416,160 400,168" fill="#22c55e"/>
  <text x="364" y="146" text-anchor="middle" fill="#15803d" font-size="11" font-weight="700">COPY</text>
  <text x="364" y="180" text-anchor="middle" fill="#15803d" font-size="11" font-weight="700">--from=builder</text>

  <!-- runner stage -->
  <g filter="url(#ms)">
    <rect x="430" y="96" width="260" height="128" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  </g>
  <text x="560" y="122" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">runner ステージ</text>
  <text x="560" y="141" text-anchor="middle" fill="#16a34a" font-size="11">＝ 最終イメージ</text>
  <rect x="456" y="152" width="208" height="28" rx="6" fill="#bbf7d0"/>
  <text x="560" y="171" text-anchor="middle" fill="#15803d" font-size="12">dist/ のみ</text>
  <rect x="456" y="186" width="208" height="28" rx="6" fill="#bbf7d0"/>
  <text x="560" y="205" text-anchor="middle" fill="#15803d" font-size="12">本番依存だけ</text>

  <!-- size badges -->
  <text x="170" y="300" text-anchor="middle" fill="#9a3412" font-size="12" font-weight="700">サイズ ≈ 1GB</text>
  <text x="560" y="252" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">サイズ ≈ 120MB</text>
</svg>
