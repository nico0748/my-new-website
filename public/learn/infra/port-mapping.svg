<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="pm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- External -->
  <g filter="url(#pm)">
    <rect x="20" y="95" width="150" height="74" rx="10" fill="#6366f1"/>
  </g>
  <text x="95" y="125" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">外部 / ブラウザ</text>
  <text x="95" y="145" text-anchor="middle" fill="#c7d2fe" font-size="11">http://&lt;IP&gt;:8080</text>

  <!-- arrow to host -->
  <line x1="170" y1="132" x2="222" y2="132" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="220,126 232,132 220,138" fill="#94a3b8"/>

  <!-- Host box -->
  <rect x="240" y="40" width="460" height="200" rx="12" fill="#f8f9fb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="262" y="66" fill="#6366f1" font-size="13" font-weight="700">VPS（ホスト）</text>

  <!-- host port chip -->
  <rect x="262" y="108" width="92" height="48" rx="8" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="308" y="128" text-anchor="middle" fill="#4f46e5" font-size="12">ホスト</text>
  <text x="308" y="146" text-anchor="middle" fill="#4f46e5" font-size="15" font-weight="700">:8080</text>

  <!-- mapping arrow -->
  <line x1="354" y1="132" x2="438" y2="132" stroke="#2496ed" stroke-width="2.5"/>
  <polygon points="436,125 450,132 436,139" fill="#2496ed"/>
  <text x="400" y="122" text-anchor="middle" fill="#2496ed" font-size="11" font-weight="700">-p 8080:80</text>

  <!-- Container box -->
  <rect x="458" y="92" width="222" height="96" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="569" y="116" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">コンテナ（nginx）</text>
  <rect x="478" y="128" width="92" height="44" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="524" y="146" text-anchor="middle" fill="#15803d" font-size="12">コンテナ</text>
  <text x="524" y="163" text-anchor="middle" fill="#15803d" font-size="15" font-weight="700">:80</text>
  <text x="620" y="152" text-anchor="middle" fill="#16a34a" font-size="11">nginx が80で待受</text>

  <!-- formula -->
  <text x="360" y="278" text-anchor="middle" font-size="14"><tspan fill="#1a1a2e" font-weight="700">-p </tspan><tspan fill="#4f46e5" font-weight="700">8080</tspan><tspan fill="#1a1a2e"> : </tspan><tspan fill="#15803d" font-weight="700">80</tspan><tspan fill="#5a5a7a">　= 左（青）がホスト / 右（緑）がコンテナ</tspan></text>
</svg>
