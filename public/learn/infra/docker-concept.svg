<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="dc" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Left: app + everything it needs -->
  <rect x="20" y="52" width="212" height="200" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="126" y="76" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="700">アプリ＋必要なもの一式</text>
  <rect x="38" y="90" width="176" height="32" rx="6" fill="#fed7aa"/>
  <text x="126" y="111" text-anchor="middle" fill="#9a3412" font-size="12">アプリ本体</text>
  <rect x="38" y="128" width="176" height="32" rx="6" fill="#fed7aa"/>
  <text x="126" y="149" text-anchor="middle" fill="#9a3412" font-size="12">ライブラリ / 依存</text>
  <rect x="38" y="166" width="176" height="32" rx="6" fill="#fed7aa"/>
  <text x="126" y="187" text-anchor="middle" fill="#9a3412" font-size="12">設定ファイル</text>
  <rect x="38" y="204" width="176" height="32" rx="6" fill="#fed7aa"/>
  <text x="126" y="225" text-anchor="middle" fill="#9a3412" font-size="12">ランタイム（言語）</text>

  <!-- arrow 1 -->
  <line x1="232" y1="152" x2="288" y2="152" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="286,146 298,152 286,158" fill="#94a3b8"/>
  <text x="262" y="142" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">固める</text>

  <!-- Image box -->
  <g filter="url(#dc)">
    <rect x="300" y="108" width="126" height="88" rx="10" fill="#2496ed"/>
  </g>
  <text x="363" y="142" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">イメージ</text>
  <text x="363" y="164" text-anchor="middle" fill="#bae6fd" font-size="11">1つの箱に封入</text>

  <!-- arrow 2 -->
  <line x1="426" y1="152" x2="470" y2="152" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="468,146 480,152 468,158" fill="#94a3b8"/>
  <text x="453" y="142" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">配って</text>

  <!-- Right: 3 environments run the same -->
  <g font-size="12.5">
    <rect x="486" y="58" width="214" height="52" rx="9" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
    <text x="506" y="89" fill="#15803d" font-weight="700">あなたの PC</text>
    <circle cx="660" cy="84" r="13" fill="#22c55e"/>
    <path d="M653 84 l5 5 l9 -10" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="486" y="124" width="214" height="52" rx="9" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
    <text x="506" y="155" fill="#15803d" font-weight="700">本番の VPS</text>
    <circle cx="660" cy="150" r="13" fill="#22c55e"/>
    <path d="M653 150 l5 5 l9 -10" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="486" y="190" width="214" height="52" rx="9" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
    <text x="506" y="221" fill="#15803d" font-weight="700">同僚の PC</text>
    <circle cx="660" cy="216" r="13" fill="#22c55e"/>
    <path d="M653 216 l5 5 l9 -10" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="360" y="284" text-anchor="middle" fill="#475569" font-size="12">同じイメージなら、どのマシンでも<tspan font-weight="700" fill="#15803d">まったく同じに動く</tspan>（環境差異が消える）</text>
</svg>
