<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="rd" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Recipe card (image) -->
  <g filter="url(#rd)">
    <rect x="34" y="74" width="194" height="150" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <rect x="34" y="74" width="194" height="34" rx="10" fill="#6366f1"/>
  <rect x="34" y="92" width="194" height="16" fill="#6366f1"/>
  <text x="131" y="97" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">レシピ＝イメージ</text>
  <line x1="54" y1="128" x2="208" y2="128" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="148" x2="208" y2="148" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="168" x2="186" y2="168" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="188" x2="208" y2="188" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round"/>
  <text x="131" y="214" text-anchor="middle" fill="#6366f1" font-size="11">読み取り専用・汚れない</text>

  <!-- arrow: docker run -->
  <line x1="240" y1="148" x2="306" y2="148" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="304,141 318,148 304,155" fill="#22c55e"/>
  <text x="276" y="138" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">docker run</text>
  <text x="276" y="170" text-anchor="middle" fill="#16a34a" font-size="11">＝調理する</text>

  <!-- Dish 1 -->
  <g filter="url(#rd)">
    <ellipse cx="430" cy="96" rx="66" ry="26" fill="#fff" stroke="#e2e4e9" stroke-width="1.3"/>
  </g>
  <ellipse cx="430" cy="94" rx="34" ry="13" fill="#22c55e"/>
  <text x="430" y="138" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="600">コンテナ</text>

  <!-- Dish 2 -->
  <g filter="url(#rd)">
    <ellipse cx="600" cy="96" rx="66" ry="26" fill="#fff" stroke="#e2e4e9" stroke-width="1.3"/>
  </g>
  <ellipse cx="600" cy="94" rx="34" ry="13" fill="#6366f1"/>
  <text x="600" y="138" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="600">コンテナ</text>

  <!-- Dish 3 -->
  <g filter="url(#rd)">
    <ellipse cx="515" cy="206" rx="66" ry="26" fill="#fff" stroke="#e2e4e9" stroke-width="1.3"/>
  </g>
  <ellipse cx="515" cy="204" rx="34" ry="13" fill="#3b82f6"/>
  <text x="515" y="248" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="600">コンテナ</text>

  <text x="450" y="284" text-anchor="middle" fill="#475569" font-size="12">1つのレシピ（イメージ）から、料理（コンテナ）は<tspan font-weight="700">何皿でも</tspan>作れる</text>
</svg>
