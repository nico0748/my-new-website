<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="ei-sh" x="-6%" y="-6%" width="112%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ei-gray" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#94a3b8"/>
    </marker>
    <marker id="ei-grn" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#22c55e"/>
    </marker>
  </defs>

  <text x="28" y="30" fill="#1a1a2e" font-size="14" font-weight="700">秘密の受け渡し（.env → compose → コンテナ）</text>

  <!-- .env card -->
  <g filter="url(#ei-sh)">
    <rect x="24" y="66" width="184" height="112" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  </g>
  <!-- lock icon -->
  <path d="M40 88 v-4 a7 7 0 0 1 14 0 v4" fill="none" stroke="#475569" stroke-width="2"/>
  <rect x="36" y="88" width="22" height="16" rx="3" fill="#475569"/>
  <text x="66" y="101" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" font-weight="700" fill="#1a1a2e">.env</text>
  <text x="40" y="132" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12"><tspan fill="#1a1a2e" font-weight="700">DB_PASSWORD=</tspan><tspan fill="#dc2626" font-weight="700">••••••</tspan></text>
  <text x="40" y="158" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12"><tspan fill="#1a1a2e" font-weight="700">JWT_SECRET=</tspan><tspan fill="#dc2626" font-weight="700">••••••</tspan></text>

  <!-- gitignore tag -->
  <rect x="24" y="190" width="184" height="30" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="116" y="210" text-anchor="middle" fill="#b91c1c" font-size="11.5" font-weight="700">→ .gitignore（コミットしない）</text>

  <!-- arrow .env -> compose -->
  <line x1="208" y1="122" x2="266" y2="122" stroke="#94a3b8" stroke-width="2" marker-end="url(#ei-gray)"/>
  <text x="237" y="112" text-anchor="middle" fill="#475569" font-size="10.5" font-weight="700">読込</text>

  <!-- compose.yml card -->
  <g filter="url(#ei-sh)">
    <rect x="270" y="70" width="200" height="108" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <text x="286" y="96" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" font-weight="700" fill="#4f46e5">compose.yml</text>
  <text x="286" y="122" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" fill="#4f46e5" font-weight="700">environment:</text>
  <text x="302" y="144" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12"><tspan fill="#1a1a2e" font-weight="700">DB_PASSWORD:</tspan></text>
  <text x="318" y="165" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" fill="#7c3aed" font-weight="700">${DB_PASSWORD}</text>
  <text x="370" y="196" text-anchor="middle" fill="#7c3aed" font-size="11" font-weight="700">変数置換（${...} を実値に）</text>

  <!-- fan-out arrows (green) -->
  <line x1="470" y1="118" x2="554" y2="90" stroke="#22c55e" stroke-width="2.5" marker-end="url(#ei-grn)"/>
  <line x1="470" y1="134" x2="554" y2="230" stroke="#22c55e" stroke-width="2.5" marker-end="url(#ei-grn)"/>
  <text x="524" y="150" text-anchor="middle" fill="#15803d" font-size="10.5" font-weight="700">注入</text>

  <!-- backend container -->
  <rect x="558" y="64" width="140" height="56" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="628" y="88" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">backend</text>
  <text x="628" y="107" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="10.5" fill="#16a34a" font-weight="700">environment</text>

  <!-- postgres container -->
  <rect x="558" y="204" width="140" height="56" rx="10" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="628" y="228" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="700">postgres</text>
  <text x="628" y="247" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="10.5" fill="#2563eb" font-weight="700">environment</text>

  <!-- caption -->
  <text x="360" y="302" text-anchor="middle" font-size="13" fill="#1a1a2e">秘密は <tspan font-family="ui-monospace,'SF Mono',Menlo,monospace" font-weight="700" fill="#dc2626">.env</tspan> に集約 → compose が <tspan font-family="ui-monospace,'SF Mono',Menlo,monospace" font-weight="700" fill="#7c3aed">${...}</tspan> を置換 → 各コンテナに注入</text>
</svg>
