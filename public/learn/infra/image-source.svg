<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="is-sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="is-pull" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#2496ed"/>
    </marker>
    <marker id="is-build" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#6366f1"/>
    </marker>
    <marker id="is-run" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- LEFT: registry (pull) -->
  <g filter="url(#is-sh)">
    <rect x="55" y="30" width="210" height="54" rx="8" fill="#f97316"/>
    <text x="160" y="57" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">レジストリ</text>
    <text x="160" y="74" text-anchor="middle" fill="#fed7aa" font-size="11">Docker Hub（既製の倉庫）</text>
  </g>
  <line x1="160" y1="84" x2="160" y2="148" stroke="#2496ed" stroke-width="2" marker-end="url(#is-pull)"/>
  <text x="174" y="120" fill="#2496ed" font-size="12" font-weight="700"><tspan font-family="ui-monospace,'SF Mono',Menlo,monospace">pull</tspan> 取ってくる</text>

  <!-- RIGHT: Dockerfile (build) -->
  <g filter="url(#is-sh)">
    <rect x="455" y="30" width="210" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="560" y="57" text-anchor="middle" fill="#4f46e5" font-size="13" font-weight="600">Dockerfile</text>
    <text x="560" y="74" text-anchor="middle" fill="#6366f1" font-size="11">あなたのレシピ（自作）</text>
  </g>
  <line x1="560" y1="84" x2="560" y2="148" stroke="#6366f1" stroke-width="2" marker-end="url(#is-build)"/>
  <text x="574" y="120" fill="#6366f1" font-size="12" font-weight="700"><tspan font-family="ui-monospace,'SF Mono',Menlo,monospace">build</tspan> 作る</text>

  <!-- images (both become "image") -->
  <g filter="url(#is-sh)">
    <rect x="55" y="152" width="210" height="58" rx="8" fill="#eff8ff" stroke="#2496ed" stroke-width="1.5"/>
    <text x="160" y="177" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700">イメージ</text>
    <text x="160" y="196" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="10.5" fill="#2496ed">image: postgres:16-alpine</text>
  </g>
  <g filter="url(#is-sh)">
    <rect x="455" y="152" width="210" height="58" rx="8" fill="#eff8ff" stroke="#2496ed" stroke-width="1.5"/>
    <text x="560" y="177" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700">イメージ</text>
    <text x="560" y="196" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="10.5" fill="#2496ed">build: ./api-python</text>
  </g>

  <!-- images -> container (run) -->
  <line x1="180" y1="210" x2="322" y2="258" stroke="#22c55e" stroke-width="2" marker-end="url(#is-run)"/>
  <line x1="540" y1="210" x2="398" y2="258" stroke="#22c55e" stroke-width="2" marker-end="url(#is-run)"/>
  <text x="238" y="236" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#16a34a">run</text>
  <text x="482" y="236" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#16a34a">run</text>

  <!-- container -->
  <g filter="url(#is-sh)">
    <rect x="278" y="262" width="164" height="52" rx="8" fill="#22c55e"/>
    <text x="360" y="293" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">コンテナ</text>
  </g>

  <!-- caption -->
  <text x="360" y="332" text-anchor="middle" fill="#1a1a2e" font-size="12.5">既製品は<tspan font-weight="700" fill="#2496ed">取ってくる（pull）</tspan>、自作は<tspan font-weight="700" fill="#6366f1">作る（build）</tspan>。どちらも“イメージ”になってからコンテナが動く</text>
</svg>
