<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="ys-sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="28" y="32" fill="#1a1a2e" font-size="14" font-weight="700">compose.yml の構造（YAML）</text>

  <!-- code panel -->
  <g filter="url(#ys-sh)">
    <rect x="26" y="48" width="372" height="246" rx="12" fill="#f8f9fb" stroke="#d1d5db" stroke-width="1.5"/>
  </g>

  <!-- indent guides (縦線 = 入れ子の深さ) -->
  <line x1="64" y1="104" x2="64" y2="252" stroke="#c7d2fe" stroke-width="1.2"/>
  <line x1="88" y1="136" x2="88" y2="252" stroke="#c7d2fe" stroke-width="1.2"/>
  <line x1="112" y1="200" x2="112" y2="224" stroke="#c7d2fe" stroke-width="1.2"/>

  <!-- leader lines (behind code, over panel) -->
  <line x1="424" y1="95" x2="252" y2="112" stroke="#94a3b8" stroke-width="1.4"/>
  <line x1="424" y1="144" x2="248" y2="148" stroke="#2496ed" stroke-width="1.4"/>
  <line x1="424" y1="200" x2="70" y2="176" stroke="#6366f1" stroke-width="1.4"/>
  <line x1="424" y1="256" x2="128" y2="212" stroke="#22c55e" stroke-width="1.4"/>
  <line x1="424" y1="306" x2="98" y2="244" stroke="#dc2626" stroke-width="1.4"/>
  <circle cx="252" cy="112" r="3" fill="#94a3b8"/>
  <circle cx="248" cy="148" r="3" fill="#2496ed"/>
  <circle cx="70" cy="176" r="3" fill="#6366f1"/>
  <circle cx="128" cy="212" r="3" fill="#22c55e"/>
  <circle cx="98" cy="244" r="3" fill="#dc2626"/>

  <!-- code -->
  <text font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5">
    <tspan x="44" y="84" fill="#1a1a2e" font-weight="700">services:</tspan>
  </text>
  <text font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5">
    <tspan x="68" y="116" fill="#1a1a2e" font-weight="700">web:</tspan><tspan dx="18" fill="#94a3b8" font-weight="400"># サービス名（任意）</tspan>
  </text>
  <text font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5">
    <tspan x="92" y="148" fill="#1a1a2e" font-weight="700">image:</tspan><tspan dx="6" fill="#2496ed" font-weight="700">nginx:alpine</tspan>
  </text>
  <text font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5">
    <tspan x="92" y="180" fill="#1a1a2e" font-weight="700">ports:</tspan>
  </text>
  <text font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5">
    <tspan x="116" y="212" fill="#22c55e" font-weight="700">- </tspan><tspan fill="#2496ed" font-weight="700">"8080:80"</tspan>
  </text>
  <text font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5">
    <tspan x="92" y="244" fill="#1a1a2e" font-weight="700">restart:</tspan><tspan dx="6" fill="#15803d" font-weight="700">unless-stopped</tspan>
  </text>

  <!-- annotations -->
  <rect x="424" y="78" width="272" height="34" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="438" y="99" font-size="12" fill="#475569"><tspan font-family="ui-monospace,'SF Mono',Menlo,monospace" font-weight="700" fill="#64748b">#</tspan> ＝ コメント（実行では無視）</text>

  <rect x="424" y="126" width="272" height="36" rx="8" fill="#eff8ff" stroke="#2496ed" stroke-width="1.5"/>
  <text x="438" y="149" font-size="12" fill="#475569"><tspan font-family="ui-monospace,'SF Mono',Menlo,monospace" font-weight="700" fill="#2496ed">key: value</tspan> ＝ マップ（対応）</text>

  <rect x="424" y="176" width="272" height="48" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="438" y="197" font-size="12" fill="#4f46e5" font-weight="700">インデント（半角スペース）</text>
  <text x="438" y="215" font-size="12" fill="#6366f1">＝ 入れ子の深さ（構造そのもの）</text>

  <rect x="424" y="238" width="272" height="36" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="438" y="261" font-size="12" fill="#475569">先頭 <tspan font-family="ui-monospace,'SF Mono',Menlo,monospace" font-weight="700" fill="#22c55e">-</tspan> ＝ リストの1項目</text>

  <rect x="424" y="288" width="272" height="36" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="438" y="311" font-size="12" fill="#b91c1c" font-weight="700">タブ厳禁 ― 全部スペースで揃える</text>

  <!-- caption -->
  <text x="360" y="362" text-anchor="middle" font-size="13" fill="#1a1a2e">YAMLは<tspan font-weight="700">“インデントで構造を作る”</tspan>言語。ここを外すと必ず壊れる</text>
</svg>
