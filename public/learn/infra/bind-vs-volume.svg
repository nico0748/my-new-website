<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="bv" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="bvArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,1 9,5 0,9" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ===== Left: bind mount ===== -->
  <rect x="20" y="14" width="320" height="276" rx="12" fill="#f8f9fb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="180" y="40" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">bind mount</text>

  <g filter="url(#bv)">
    <rect x="50" y="60" width="260" height="64" rx="9" fill="#6366f1"/>
  </g>
  <text x="180" y="86" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">ホストの任意パス</text>
  <text x="180" y="106" text-anchor="middle" fill="#c7d2fe" font-size="12">~/site</text>

  <line x1="180" y1="128" x2="180" y2="168" stroke="#94a3b8" stroke-width="2" marker-start="url(#bvArrow)" marker-end="url(#bvArrow)"/>
  <text x="232" y="152" fill="#475569" font-size="11">双方向</text>

  <rect x="50" y="172" width="260" height="64" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="198" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">コンテナ内パス</text>
  <text x="180" y="218" text-anchor="middle" fill="#16a34a" font-size="12">/usr/share/nginx/html</text>

  <text x="180" y="262" text-anchor="middle" fill="#475569" font-size="11.5">編集が即反映・パスに依存</text>
  <text x="180" y="280" text-anchor="middle" fill="#475569" font-size="11.5">向き: 設定ファイル / 開発中のソース</text>

  <!-- ===== Right: named volume ===== -->
  <rect x="380" y="14" width="320" height="276" rx="12" fill="#f8f9fb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="540" y="40" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">named volume</text>

  <g filter="url(#bv)">
    <rect x="410" y="60" width="260" height="64" rx="9" fill="#2496ed"/>
  </g>
  <text x="540" y="86" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Docker 管理領域</text>
  <text x="540" y="106" text-anchor="middle" fill="#bae0fd" font-size="12">volume: app-data</text>

  <line x1="540" y1="128" x2="540" y2="168" stroke="#94a3b8" stroke-width="2" marker-start="url(#bvArrow)" marker-end="url(#bvArrow)"/>
  <text x="592" y="152" fill="#475569" font-size="11">双方向</text>

  <rect x="410" y="172" width="260" height="64" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="198" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">コンテナ内パス</text>
  <text x="540" y="218" text-anchor="middle" fill="#16a34a" font-size="12">/var/lib/postgresql/data</text>

  <text x="540" y="262" text-anchor="middle" fill="#475569" font-size="11.5">Docker が管理・移植しやすい</text>
  <text x="540" y="280" text-anchor="middle" fill="#475569" font-size="11.5">向き: DB などの永続データ</text>
</svg>
