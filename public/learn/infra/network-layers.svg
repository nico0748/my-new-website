<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="nl-sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="nl-a" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#94a3b8"/>
    </marker>
    <marker id="nl-x" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <polygon points="0,1 10,5 0,9" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- browser -->
  <g filter="url(#nl-sh)">
    <rect x="310" y="8" width="100" height="34" rx="17" fill="#6366f1"/>
    <text x="360" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">ブラウザ</text>
  </g>
  <line x1="360" y1="42" x2="360" y2="62" stroke="#94a3b8" stroke-width="2" marker-end="url(#nl-a)"/>

  <!-- edge zone -->
  <rect x="40" y="64" width="640" height="118" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="58" y="86" fill="#4f46e5" font-size="12" font-weight="700">edge ネットワーク ― 外と繋がる面（nginx / frontend / backend）</text>
  <g filter="url(#nl-sh)">
    <rect x="90" y="98" width="150" height="48" rx="8" fill="#fff" stroke="#e2e4e9" stroke-width="1.2"/>
    <text x="165" y="127" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="600">frontend</text>
  </g>
  <g filter="url(#nl-sh)">
    <rect x="300" y="98" width="120" height="48" rx="8" fill="#22c55e"/>
    <text x="360" y="127" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">nginx</text>
  </g>
  <line x1="300" y1="122" x2="242" y2="122" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#nl-a)"/>
  <text x="270" y="114" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#15803d">/</text>

  <!-- backend (bridge) -->
  <g filter="url(#nl-sh)">
    <rect x="300" y="188" width="120" height="52" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="360" y="211" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="600">backend</text>
    <text x="360" y="229" text-anchor="middle" fill="#64748b" font-size="10.5">両方に属す（橋渡し）</text>
  </g>
  <line x1="360" y1="146" x2="360" y2="188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#nl-a)"/>
  <text x="384" y="172" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#2563eb">/api</text>

  <!-- internal zone -->
  <rect x="40" y="256" width="640" height="112" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="58" y="278" fill="#15803d" font-size="12" font-weight="700">internal ネットワーク ― 外に出ない（internal: true）（backend / postgres / redis）</text>
  <g filter="url(#nl-sh)">
    <rect x="150" y="292" width="150" height="48" rx="8" fill="#3b82f6"/>
    <text x="225" y="321" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">postgres</text>
  </g>
  <g filter="url(#nl-sh)">
    <rect x="420" y="292" width="150" height="48" rx="8" fill="#ef4444"/>
    <text x="495" y="321" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">redis</text>
  </g>
  <line x1="335" y1="240" x2="250" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#nl-a)"/>
  <line x1="390" y1="240" x2="470" y2="292" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#nl-a)"/>

  <!-- blocked: edge (frontend) -> postgres -->
  <line x1="150" y1="146" x2="188" y2="290" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#nl-x)"/>
  <g>
    <circle cx="150" cy="222" r="12" fill="#dc2626"/>
    <path d="M145 217 l10 10 M155 217 l-10 10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="120" y="226" text-anchor="end" fill="#b91c1c" font-size="11" font-weight="700">届かない</text>

  <!-- caption -->
  <text x="360" y="392" text-anchor="middle" fill="#1a1a2e" font-size="12.5">DB・cache は <tspan font-weight="700" fill="#15803d">internal</tspan> だけに置く。橋渡しは backend のみ ― 外や nginx から直接は<tspan font-weight="700" fill="#b91c1c">届かない</tspan></text>
</svg>
