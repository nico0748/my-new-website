<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="s2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ===== Left: Image ===== -->
  <text x="170" y="40" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">イメージ</text>
  <text x="170" y="60" text-anchor="middle" fill="#5a5a7a" font-size="12">読み取り専用レイヤーの積み重ね</text>

  <g filter="url(#s2)">
    <!-- CMD / meta (top) -->
    <rect x="60" y="92" width="220" height="32" rx="6" fill="#64748b"/>
    <text x="170" y="113" text-anchor="middle" fill="#fff" font-size="12">CMD ["nginx","-g","daemon off;"]</text>
    <!-- COPY -->
    <rect x="60" y="128" width="220" height="32" rx="6" fill="#7c3aed"/>
    <text x="170" y="149" text-anchor="middle" fill="#fff" font-size="12">COPY ./html /usr/share/nginx</text>
    <!-- RUN -->
    <rect x="60" y="164" width="220" height="32" rx="6" fill="#6366f1"/>
    <text x="170" y="185" text-anchor="middle" fill="#fff" font-size="12">RUN apt-get install ...</text>
    <!-- FROM base (bottom) -->
    <rect x="60" y="200" width="220" height="32" rx="6" fill="#2496ed"/>
    <text x="170" y="221" text-anchor="middle" fill="#fff" font-size="12">FROM nginx:alpine（ベース）</text>
  </g>

  <!-- read-only bracket -->
  <text x="300" y="135" fill="#5a5a7a" font-size="11" font-weight="600">read</text>
  <text x="300" y="150" fill="#5a5a7a" font-size="11" font-weight="600">only</text>
  <line x1="292" y1="92" x2="292" y2="232" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="292" y1="92" x2="297" y2="92" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="292" y1="232" x2="297" y2="232" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== Arrow ===== -->
  <line x1="320" y1="170" x2="392" y2="170" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="390,163 404,170 390,177" fill="#22c55e"/>
  <text x="360" y="158" text-anchor="middle" fill="#15803d" font-size="11" font-weight="600">run</text>

  <!-- ===== Right: Container ===== -->
  <text x="510" y="40" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">コンテナ</text>

  <!-- Writable layer (top) -->
  <rect x="400" y="56" width="220" height="32" rx="6" fill="#22c55e"/>
  <text x="510" y="77" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">書き込み可能層（コンテナ固有）</text>

  <g filter="url(#s2)">
    <rect x="400" y="92" width="220" height="32" rx="6" fill="#64748b"/>
    <text x="510" y="113" text-anchor="middle" fill="#fff" font-size="12">CMD ["nginx", ...]</text>
    <rect x="400" y="128" width="220" height="32" rx="6" fill="#7c3aed"/>
    <text x="510" y="149" text-anchor="middle" fill="#fff" font-size="12">COPY ./html ...</text>
    <rect x="400" y="164" width="220" height="32" rx="6" fill="#6366f1"/>
    <text x="510" y="185" text-anchor="middle" fill="#fff" font-size="12">RUN apt-get ...</text>
    <rect x="400" y="200" width="220" height="32" rx="6" fill="#2496ed"/>
    <text x="510" y="221" text-anchor="middle" fill="#fff" font-size="12">FROM nginx:alpine</text>
  </g>

  <text x="510" y="250" text-anchor="middle" fill="#5a5a7a" font-size="11">↑ 下4層はイメージと同じ（共有・読み取り専用）</text>

  <!-- ===== Bottom note ===== -->
  <rect x="60" y="290" width="560" height="106" rx="10" fill="#eff8ff" stroke="#bae0fd" stroke-width="1.2"/>
  <text x="80" y="316" fill="#2496ed" font-size="13" font-weight="700">ポイント</text>
  <text x="80" y="340" fill="#1a1a2e" font-size="12.5">・1 つのイメージから、コンテナは何個でも作れる（クラスとインスタンスの関係）。</text>
  <text x="80" y="362" fill="#1a1a2e" font-size="12.5">・読み取り専用レイヤーは全コンテナで共有 → ディスクを節約できる。</text>
  <text x="80" y="384" fill="#1a1a2e" font-size="12.5">・コンテナを消すと書き込み可能層も消える → 永続化はボリュームが必要（2.5）。</text>
</svg>
