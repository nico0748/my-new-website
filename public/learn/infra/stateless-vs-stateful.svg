<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Inter','Noto Sans JP',sans-serif">
  <defs>
    <filter id="ss" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ssArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,1 9,5 0,9" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ===== Left: stateless app ===== -->
  <rect x="20" y="12" width="320" height="270" rx="12" fill="#f8f9fb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="180" y="38" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">アプリ（stateless）</text>

  <!-- recycle loop -->
  <path d="M261 88 C 261 62, 99 62, 99 88" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ssArrow)"/>
  <text x="180" y="60" text-anchor="middle" fill="#16a34a" font-size="10">何度でも作り直せる</text>

  <!-- old container (dashed = 一時的, deleted) -->
  <rect x="44" y="92" width="110" height="72" rx="10" fill="#fff" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="99" y="132" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">コンテナ</text>
  <circle cx="150" cy="96" r="11" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="145" y1="91" x2="155" y2="101" stroke="#dc2626" stroke-width="1.6"/>
  <line x1="155" y1="91" x2="145" y2="101" stroke="#dc2626" stroke-width="1.6"/>
  <text x="99" y="180" text-anchor="middle" fill="#b91c1c" font-size="10.5">消す</text>

  <!-- rebuild arrow -->
  <line x1="158" y1="128" x2="204" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#ssArrow)"/>
  <text x="181" y="120" text-anchor="middle" fill="#15803d" font-size="10.5">作り直す</text>

  <!-- new container (solid = 主役) -->
  <g filter="url(#ss)"><rect x="206" y="92" width="110" height="72" rx="10" fill="#22c55e"/></g>
  <text x="261" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">コンテナ</text>
  <text x="261" y="142" text-anchor="middle" fill="#dcfce7" font-size="10">新しく起動</text>

  <text x="180" y="204" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">消して作り直して OK</text>
  <text x="180" y="226" text-anchor="middle" fill="#475569" font-size="11.5">状態を持たない（stateless）</text>
  <text x="180" y="250" text-anchor="middle" fill="#64748b" font-size="11">データはコンテナの中に残さない</text>

  <!-- ===== Right: stateful data ===== -->
  <rect x="380" y="12" width="320" height="270" rx="12" fill="#f8f9fb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="540" y="38" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="700">データ（stateful）</text>

  <!-- container being deleted (dashed) -->
  <rect x="470" y="70" width="140" height="56" rx="10" fill="#fff" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="540" y="94" text-anchor="middle" fill="#b91c1c" font-size="12" font-weight="600">コンテナ</text>
  <text x="540" y="112" text-anchor="middle" fill="#ef4444" font-size="10.5">消しても…</text>
  <circle cx="606" cy="74" r="11" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="601" y1="69" x2="611" y2="79" stroke="#dc2626" stroke-width="1.6"/>
  <line x1="611" y1="69" x2="601" y2="79" stroke="#dc2626" stroke-width="1.6"/>

  <!-- write down to volume -->
  <line x1="540" y1="128" x2="540" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#ssArrow)"/>
  <text x="562" y="148" fill="#15803d" font-size="10">保存</text>

  <!-- named volume cylinder (persists) -->
  <g filter="url(#ss)">
    <path d="M470 172 L470 238 A70 15 0 0 0 610 238 L610 172" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <ellipse cx="540" cy="172" rx="70" ry="15" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="200" text-anchor="middle" fill="#15803d" font-size="12.5" font-weight="700">named volume</text>
  <text x="540" y="220" text-anchor="middle" fill="#16a34a" font-size="11.5">データ（永続）</text>
  <rect x="620" y="192" width="60" height="22" rx="11" fill="#22c55e"/>
  <text x="650" y="207" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">永続</text>

  <text x="540" y="266" text-anchor="middle" fill="#15803d" font-size="12.5" font-weight="700">コンテナを消してもデータは残る</text>

  <!-- caption -->
  <text x="360" y="306" text-anchor="middle" fill="#1a1a2e" font-size="12.5"><tspan font-weight="700">使い捨てできるもの</tspan>（アプリ）と、<tspan font-weight="700" fill="#15803d">残さないといけないもの</tspan>（データ）を分ける</text>
</svg>
